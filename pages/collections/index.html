<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Collections — Nexo Hub</title>
  <meta name="description" content="Curated collections from Nexo Hub — hand-picked groups of sites for AI, dev tools, design, and more, all in one place."/>
  <link rel="canonical" href="https://nexohub.nexosites.xyz/pages/collections/"/>
  <meta property="og:title" content="Collections — Nexo Hub"/>
  <meta property="og:description" content="Hand-picked collections of the best sites in Nexo Hub's directory, grouped by topic."/>
  <meta property="og:image" content="https://nexohub.nexosites.xyz/assets/logo-512.png"/>
  <meta name="theme-color" content="#7c5cfc"/>
  <link rel="icon" href="../../assets/favicon-32.png" sizes="32x32" type="image/png"/>
  <link rel="apple-touch-icon" href="../../assets/logo-192.png"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://tiupkpabwuefclbrpaef.supabase.co"/>
  <link rel="preconnect" href="https://www.google.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../style.css?v=20260629-3"/>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes spin { to { transform:rotate(360deg) } }

    .col-wrap {
      position: relative; z-index: 1;
      max-width: 1080px; margin: 0 auto;
      padding: 40px 24px 100px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--muted);
      text-decoration: none; margin-bottom: 36px;
      transition: color .18s, gap .18s;
    }
    .back-link:hover { color: var(--accent); gap: 10px; }

    .col-hero { text-align: center; margin-bottom: 36px; animation: fadeUp .4s ease both; }
    .col-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .col-title {
      font-family: var(--font-d); font-size: clamp(1.7rem,4vw,2.3rem);
      font-weight: 800; letter-spacing: -.03em; margin:0 0 8px;
    }
    .col-sub { font-size: .85rem; color: var(--text2); line-height: 1.6; max-width: 540px; margin: 0 auto; }

    /* Collection hub cards */
    .hub-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px;
    }
    .hub-card {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px;
      text-decoration: none; color: var(--text);
      animation: cardIn .35s ease both;
      transition: border-color .2s, transform .18s, box-shadow .2s;
    }
    .hub-card:hover { border-color: var(--hub-color,var(--accent)); transform: translateY(-3px); box-shadow: var(--shadow-sm); }
    .hub-card-icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; background: color-mix(in srgb, var(--hub-color,var(--accent)) 14%, transparent);
    }
    .hub-card-title { font-family: var(--font-d); font-weight: 800; font-size: 1.05rem; letter-spacing: -.01em; }
    .hub-card-desc { font-size: .8rem; color: var(--text2); line-height: 1.6; flex: 1; }
    .hub-card-count {
      align-self: flex-start; font-size: .68rem; font-family: var(--font-m); font-weight: 700;
      color: var(--hub-color,var(--accent)); background: color-mix(in srgb, var(--hub-color,var(--accent)) 12%, transparent);
      padding: 3px 10px; border-radius: 100px;
    }

    /* Collection detail */
    .col-detail-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
      animation: fadeUp .4s ease both;
    }
    .col-detail-icon {
      width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
      background: color-mix(in srgb, var(--hub-color,var(--accent)) 14%, transparent);
    }
    .col-detail-title { font-family: var(--font-d); font-size: clamp(1.4rem,3.4vw,1.85rem); font-weight: 800; letter-spacing: -.02em; margin:0; }
    .col-detail-desc { font-size: .85rem; color: var(--text2); line-height: 1.65; max-width: 620px; }

    .site-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 14px; }
    .site-card {
      display: flex; flex-direction: column; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      text-decoration: none; color: var(--text);
      animation: cardIn .3s ease both;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .site-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .site-card-top { display: flex; align-items: center; gap: 10px; }
    .site-card-favicon { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; background: var(--bg3); }
    .site-card-name { font-family: var(--font-d); font-weight: 700; font-size: .92rem; flex: 1; min-width: 0; }
    .site-card-arrow { color: var(--muted); font-size: .85rem; flex-shrink: 0; }
    .site-card-desc {
      font-size: .76rem; color: var(--text2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .site-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }

    .col-loading { display: flex; justify-content: center; padding: 60px 0; }
    .loading-spin {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    .col-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .col-empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
  </style>
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <header class="header" role="banner">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="Nexo Hub home">
        <img src="../../assets/logo.png" alt="Nexo Hub logo" class="logo-img" width="36" height="36" loading="eager" decoding="async"/>
        <span class="logo-text">Nexo Hub</span>
      </a>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <a href="/" class="submit-nav-btn" style="gap:7px">
          <span aria-hidden="true">←</span> Back to Hub
        </a>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
          <span class="theme-icon theme-icon-dark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          <span class="theme-icon theme-icon-light" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          <span class="ham-bar"></span>
          <span class="ham-bar"></span>
          <span class="ham-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="nav-menu" id="mobileMenu" aria-hidden="true">
    <div class="nav-menu-inner">
      <nav class="nav-menu-links" aria-label="Site navigation">
        <a href="/" class="nav-link">🏠 Home</a>
        <a href="/pages/tools/" class="nav-link">🛠️ Mini Tools</a>
        <a href="/pages/collections/" class="nav-link nav-link--active">🗂️ Collections</a>
        <a href="/pages/leaderboard/" class="nav-link">🏆 Leaderboard</a>
        <a href="/pages/new/" class="nav-link">🆕 What's New</a>
        <a href="/pages/contact/" class="nav-link">📬 Submit a Site</a>
        <a href="/pages/about/" class="nav-link">👤 About</a>
        <a href="/pages/api/" class="nav-link">⚡ API</a>
        <a href="/pages/donate/" class="nav-link">💜 Donate</a>
        <a href="/pages/admin/" class="nav-link" id="adminNavLink" style="display:none">⚙️ Admin</a>
      </nav>
      <div class="nav-menu-footer"><span>Nexo Hub by <code>Nexus</code></span></div>
    </div>
  </div>
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <main class="col-wrap" id="colWrap">
    <a href="/" class="back-link" id="backLink">← Back to Nexo Hub</a>

    <div class="col-hero" id="colHero">
      <div class="col-icon">🗂️</div>
      <h1 class="col-title">Collections</h1>
      <p class="col-sub">Hand-picked groups of sites from the directory, organized around what you're actually trying to do.</p>
    </div>

    <div id="colBody">
      <div class="col-loading"><span class="loading-spin"></span></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fav(url){ try{ const {hostname}=new URL(url); return 'https://www.google.com/s2/favicons?domain='+hostname+'&sz=64'; }catch{ return ''; } }
    function sbHeaders(){
      return { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json' };
    }

    const slug = new URLSearchParams(location.search).get('slug');

    async function init(){
      if(slug) await loadCollectionDetail(slug);
      else await loadCollectionsHub();
    }

    async function loadCollectionsHub(){
      const body = document.getElementById('colBody');
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/collections?select=*,collection_sites(count)&order=sort_order.asc`, { headers: sbHeaders() });
        if(!res.ok) throw new Error();
        const rows = await res.json();
        if(!rows.length){
          body.innerHTML = `<div class="col-empty"><div class="col-empty-icon">🌱</div><p>No collections yet — check back soon.</p></div>`;
          return;
        }
        body.innerHTML = `<div class="hub-grid">${rows.map(c=>{
          const count = (c.collection_sites && c.collection_sites[0] && c.collection_sites[0].count) || 0;
          return `
          <a class="hub-card" style="--hub-color:${esc(c.color||'#7c5cfc')}" href="?slug=${encodeURIComponent(c.slug)}">
            <div class="hub-card-icon">${esc(c.icon||'🗂️')}</div>
            <div class="hub-card-title">${esc(c.title)}</div>
            <p class="hub-card-desc">${esc(c.description||'')}</p>
            <span class="hub-card-count">${count} site${count!==1?'s':''}</span>
          </a>`;
        }).join('')}</div>`;
      }catch{
        body.innerHTML = `<div class="col-empty"><div class="col-empty-icon">⚠️</div><p>Failed to load collections — please refresh.</p></div>`;
      }
    }

    async function loadCollectionDetail(slug){
      document.getElementById('colHero').style.display = 'none';
      const body = document.getElementById('colBody');
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/collections?slug=eq.${encodeURIComponent(slug)}&select=*,collection_sites(sort_order,sites(*))`, { headers: sbHeaders() });
        if(!res.ok) throw new Error();
        const rows = await res.json();
        const col = rows[0];
        if(!col){
          body.innerHTML = `<div class="col-empty"><div class="col-empty-icon">🔍</div><p>Collection not found.</p></div>`;
          return;
        }
        document.title = `${col.title} — Collections — Nexo Hub`;
        document.getElementById('backLink').textContent = '← All Collections';
        document.getElementById('backLink').href = '/pages/collections/';

        const sites = (col.collection_sites||[])
          .slice()
          .sort((a,b)=>a.sort_order-b.sort_order)
          .map(cs=>cs.sites)
          .filter(Boolean);

        const header = `
          <div class="col-detail-header" style="--hub-color:${esc(col.color||'#7c5cfc')}">
            <div class="col-detail-icon">${esc(col.icon||'🗂️')}</div>
            <div>
              <h1 class="col-detail-title">${esc(col.title)}</h1>
              <p class="col-detail-desc">${esc(col.description||'')}</p>
            </div>
          </div>`;

        if(!sites.length){
          body.innerHTML = header + `<div class="col-empty"><div class="col-empty-icon">🌱</div><p>This collection is empty for now.</p></div>`;
          return;
        }

        body.innerHTML = header + `<div class="site-grid">${sites.map(s=>{
          const tags = (s.tags||[]).slice(0,3).map(t=>{
            const bg=(s.tag_colors||{})[t]||'#6b7280';
            return `<span class="tag" style="--tag-bg:${esc(bg)}">${esc(t)}</span>`;
          }).join('');
          const downBadge = s.health_status==='down' ? `<span class="health-badge" title="This site failed its last automatic health check and may be temporarily down.">⚠ May be down</span>` : '';
          return `
          <a class="site-card" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer" style="--card-color:${esc(s.color||'#7c5cfc')}">
            <div class="site-card-top">
              <img class="site-card-favicon" src="${esc(fav(s.url))}" alt="" onerror="this.style.display='none'"/>
              <span class="site-card-name">${esc(s.name)}</span>
              <span class="site-card-arrow" aria-hidden="true">↗</span>
            </div>
            <p class="site-card-desc">${esc(s.description||'')}</p>
            <div class="site-card-tags">${tags}${downBadge}</div>
          </a>`;
        }).join('')}</div>`;
      }catch{
        body.innerHTML = `<div class="col-empty"><div class="col-empty-icon">⚠️</div><p>Failed to load this collection — please refresh.</p></div>`;
      }
    }

    init();
  </script>

  <script>
    (function(){ var t=localStorage.getItem('nexhub_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(btn) btn.addEventListener('click',function(){
        var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        localStorage.setItem('nexhub_theme',next);
      });
      var ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      function openM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function closeM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      if(ham){ham.addEventListener('click',function(){ham.classList.contains('is-open')?closeM():openM();});}
      if(ov){ov.addEventListener('click',closeM);}
      document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM();});
    });

    /* Reveal the Admin sidebar link if this browser has a verified admin key
       stored from a previous /pages/admin/ login. Public visitors never see it. */
    (function(){
      var link = document.getElementById('adminNavLink');
      if(!link) return;
      var key = sessionStorage.getItem('nexohub_admin_key') || localStorage.getItem('nexohub_admin_key');
      if(!key) return;
      fetch('https://tiupkpabwuefclbrpaef.supabase.co/rest/v1/rpc/check_admin_key_status', {
        method: 'POST',
        headers: {
          'apikey': 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r',
          'Authorization': 'Bearer sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ input_key: key })
      }).then(function(res){
        if(!res.ok) return;
        return res.json();
      }).then(function(ok){
        if(ok === true) link.style.display = '';
      }).catch(function(){});
    })();
  </script>
  <script src="/pwa-register.js" defer></script>
</body>
</html>
