  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes spin { to { transform:rotate(360deg) } }

    .new-wrap {
      position: relative; z-index: 1;
      max-width: 880px; margin: 0 auto;
      padding: 40px 24px 100px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .75rem; color: var(--muted);
      text-decoration: none; margin-bottom: 36px;
      transition: color .18s, gap .18s;
    }
    .back-link:hover { color: var(--accent); gap: 10px; }

    .new-hero { margin-bottom: 28px; animation: fadeUp .4s ease both; }
    .new-title {
      font-family: var(--font-d); font-size: clamp(1.7rem,4vw,2.3rem);
      font-weight: 800; letter-spacing: -.03em; margin:0 0 8px;
    }
    .new-sub { font-size: .85rem; color: var(--text2); line-height: 1.6; }

    .range-tabs {
      display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap;
      animation: fadeUp .4s .05s ease both;
    }
    .range-tab {
      padding: 7px 16px; border-radius: 100px;
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--text2); font-family: var(--font-m); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: border-color .18s, color .18s, background .18s;
    }
    .range-tab:hover { border-color: var(--accent); color: var(--text); }
    .range-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .new-list { display: flex; flex-direction: column; gap: 10px; }
    .new-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 18px;
      text-decoration: none; animation: cardIn .3s ease both;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .new-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .new-card-favicon { width:32px; height:32px; border-radius:8px; flex-shrink:0; background:var(--bg3); }
    .new-card-info { flex: 1; min-width: 0; }
    .new-card-name { font-family: var(--font-d); font-weight: 700; font-size: .95rem; color: var(--text); margin-bottom: 2px; }
    .new-card-desc { font-size: .78rem; color: var(--text2); line-height: 1.5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .new-card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .new-card-cat {
      font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      padding: 2px 9px; border-radius: 100px; background: var(--accent-dim); color: var(--accent);
      white-space: nowrap;
    }
    .new-card-date { font-size: .68rem; color: var(--muted); white-space: nowrap; }

    .new-loading { display: flex; justify-content: center; padding: 60px 0; }
    .loading-spin {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    .new-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .new-empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
  </style>

    </div>

  <script>
    const SUPABASE_URL = 'https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fav(url){ try{ const {hostname}=new URL(url); return 'https://www.google.com/s2/favicons?domain='+hostname+'&sz=64'; }catch{ return ''; } }
    function timeAgo(dateStr){
      const diff = Date.now() - new Date(dateStr).getTime();
      const days = Math.floor(diff / 86400000);
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days}d ago`;
      const weeks = Math.floor(days/7);
      if (weeks < 5) return `${weeks}w ago`;
      return new Date(dateStr).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    }

    let categoryMap = {};

    async function loadCategories(){
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/categories?select=id,label,icon`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        const cats = await res.json();
        cats.forEach(c => categoryMap[c.id] = c);
      }catch{}
    }

    async function loadRecent(days){
      const list = document.getElementById('newList');
      list.innerHTML = `<div class="new-loading"><span class="loading-spin"></span></div>`;
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_recently_added`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ days_back: days, result_limit: 100 })
        });
        if(!res.ok) throw new Error();
        const sites = await res.json();
        renderList(sites);
      }catch{
        list.innerHTML = `<div class="new-empty"><div class="new-empty-icon">⚠️</div><p>Failed to load — please refresh.</p></div>`;
      }
    }

    function renderList(sites){
      const list = document.getElementById('newList');
      if(!sites.length){
        list.innerHTML = `<div class="new-empty"><div class="new-empty-icon">🌱</div><p>Nothing new in this window yet — check back soon.</p></div>`;
        return;
      }
      list.innerHTML = `<div class="new-list">${sites.map(s => {
        const cat = categoryMap[s.category];
        const catLabel = cat ? `${cat.icon} ${cat.label}` : s.category;
        return `
        <a class="new-card" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">
          <img class="new-card-favicon" src="${esc(fav(s.url))}" alt="${esc(s.name)} favicon" onerror="this.style.display='none'"/>
          <div class="new-card-info">
            <div class="new-card-name">${esc(s.name)}</div>
            <div class="new-card-desc">${esc(s.description)}</div>
          </div>
          <div class="new-card-meta">
            <span class="new-card-cat">${catLabel}</span>
            <span class="new-card-date">${timeAgo(s.created_at)}</span>
          </div>
        </a>`;
      }).join('')}</div>`;
    }

    window.switchRange = function(days, btn){
      document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadRecent(days);
    };

    (async function(){
      await loadCategories();
      loadRecent(7);
    })();
  </script>

  <script>
    (function(){ var t=localStorage.getItem('nexhub_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(btn) btn.addEventListener('click',function(){
        var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        localStorage.setItem('nexhub_theme',next);
      });
      var ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      function openM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function closeM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      if(ham){ham.addEventListener('click',function(){ham.classList.contains('is-open')?closeM():openM();});}
      if(ov){ov.addEventListener('click',closeM);}
      document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM();});
    });

    /* Reveal the Admin sidebar link if this browser has a verified admin key
       stored from a previous /pages/admin/ login. Public visitors never see it. */
    (function(){
      var link = document.getElementById('adminNavLink');
      if(!link) return;
      var key = sessionStorage.getItem('nexohub_admin_key') || localStorage.getItem('nexohub_admin_key');
      if(!key) return;
      fetch('https://tiupkpabwuefclbrpaef.supabase.co/rest/v1/rpc/check_admin_key_status', {
        method: 'POST',
        headers: {
          'apikey': 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r',
          'Authorization': 'Bearer sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ input_key: key })
      }).then(function(res){
        if(!res.ok) return;
        return res.json();
      }).then(function(ok){
        if(ok === true) link.style.display = '';
      }).catch(function(){});
    })();
  </script>
  <script src="/pwa-register.js" defer></script>
