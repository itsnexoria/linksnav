  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    @keyframes spin { to { transform:rotate(360deg) } }

    .new-wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 40px 24px 100px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: .75rem; color: var(--muted); text-decoration: none; margin-bottom: 36px; transition: color .18s, gap .18s; }
    .back-link:hover { color: var(--accent); gap: 10px; }
    .new-hero { margin-bottom: 28px; animation: fadeUp .4s ease both; }
    .new-title { font-family: var(--font-d); font-size: clamp(1.7rem,4vw,2.3rem); font-weight: 800; letter-spacing: -.03em; margin:0 0 8px; }
    .new-sub { font-size: .85rem; color: var(--text2); line-height: 1.6; }

    .blog-list { display: flex; flex-direction: column; gap: 14px; }
    .blog-card {
      display: flex; gap: 16px; align-items: flex-start;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      text-decoration: none; color: inherit; animation: cardIn .3s ease both;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .blog-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .blog-card-emoji { font-size: 1.7rem; line-height: 1; flex-shrink: 0; margin-top: 2px; }
    .blog-card-info { flex: 1; min-width: 0; }
    .blog-card-title { font-family: var(--font-d); font-weight: 700; font-size: 1.05rem; color: var(--text); margin-bottom: 6px; }
    .blog-card-excerpt { font-size: .82rem; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
    .blog-card-date { font-size: .68rem; color: var(--muted); }

    .new-loading { display: flex; justify-content: center; padding: 60px 0; }
    .loading-spin { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    .new-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .new-empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .4; }
  </style>
  <script src="/nexo-prefs.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Blog",
    "name": "Nexo Hub Blog",
    "url": "https://app.nexosites.xyz/blog/",
    "isPartOf": { "@type": "WebSite", "name": "Nexo Hub", "url": "https://app.nexosites.xyz/" }
  }
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header class="header" role="banner">

        <img src="../../assets/logo.png" alt="Nexo Hub logo" class="logo-img" width="36" height="36" loading="eager" decoding="async"/>
        <span class="logo-text">Nexo Hub</span>
      </a>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <a href="/" class="submit-nav-btn" style="gap:7px"><span aria-hidden="true">←</span> Back to Hub</a>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
          <span class="theme-icon theme-icon-dark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          <span class="theme-icon theme-icon-light" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>

  <main class="new-wrap" id="main-content">
    <a href="/" class="back-link">← Back to Nexo Hub</a>

    <div class="new-hero">
      <h1 class="new-title">📰 Blog & Changelog</h1>
      <p class="new-sub">Updates, fixes, and new features as they ship.</p>
    </div>

    <div id="blogList">
      <div class="new-loading"><span class="loading-spin"></span></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';
    function sbHeaders(extra){ return Object.assign({ 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }, extra||{}); }
    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
    function slugify(s){ return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,80); }

    async function loadPosts(){
      const list = document.getElementById('blogList');
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_blog_posts`, {
          method:'POST', headers: sbHeaders({'Content-Type':'application/json'}),
          body: JSON.stringify({ result_limit: 50, result_offset: 0 })
        });
        if(!res.ok) throw new Error();
        const posts = await res.json();
        if(!posts.length){
          list.innerHTML = `<div class="new-empty"><div class="new-empty-icon">📰</div><p>No posts yet — check back soon.</p></div>`;
          return;
        }
        list.innerHTML = `<div class="blog-list">${posts.map(p => `
          <a class="blog-card" href="/blog/${esc(p.slug)}/">
            <span class="blog-card-emoji">${esc(p.emoji||'📰')}</span>
            <div class="blog-card-info">
              <div class="blog-card-title">${esc(p.title)}</div>
              <div class="blog-card-excerpt">${esc(p.excerpt)}</div>
              <div class="blog-card-date">${fmtDate(p.created_at)}</div>
            </div>
          </a>`).join('')}</div>`;
      }catch{
        list.innerHTML = `<div class="new-empty"><div class="new-empty-icon">⚠️</div><p>Failed to load — please refresh.</p></div>`;
      }
    }
    loadPosts();

    /* ── Show a link to the admin Blog tab for verified admins ── */
    (function(){
      const key = sessionStorage.getItem('nexohub_admin_key') || localStorage.getItem('nexohub_admin_key');
      if(!key) return;
      fetch(`${SUPABASE_URL}/rest/v1/rpc/check_admin_key_status`, {
        method:'POST', headers: sbHeaders({'Content-Type':'application/json'}), body: JSON.stringify({ input_key: key })
      }).then(r => r.ok ? r.json() : false).then(ok => {
        if(ok !== true) return;
        document.getElementById('adminNavLink').style.display = '';
        const bar = document.createElement('a');
        bar.href = '/pages/admin/';
        bar.className = 'submit-nav-btn';
        bar.style.cssText = 'display:inline-flex;gap:7px;margin-top:32px';
        bar.textContent = '✏️ Manage Posts in Admin Panel';
        document.getElementById('blogList').insertAdjacentElement('afterend', bar);
      }).catch(()=>{});
    })();
  </script>

  <script>
    (function(){ var t=localStorage.getItem('nexhub_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(btn) btn.addEventListener('click',function(){
        var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        localStorage.setItem('nexhub_theme',next);
      });
      var ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      function openM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function closeM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      if(ham){ham.addEventListener('click',function(){ham.classList.contains('is-open')?closeM():openM();});}
      if(ov){ov.addEventListener('click',closeM);}
      document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM();});
    });
  </script>
  <script src="/pwa-register.js" defer></script>
</body>
