<!DOCTYPE html>
<html lang="en" data-theme="dark">
<script>(function(){var t=localStorage.getItem("nexhub_theme")||"dark";document.documentElement.setAttribute("data-theme",t);})()</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── PRIMARY SEO ─────────────────────────────────── -->
  <title>NexHub — Your Digital Command Center</title>
  <meta name="description" content="NexHub is a curated, searchable directory of 288+ essential websites across AI, gaming, dev tools, design, music, finance, security, and more. Find your next favourite tool instantly." />
  <meta name="keywords"    content="web directory, useful websites, ai tools, dev tools, gaming sites, design resources, productivity apps, nexhub" />
  <meta name="author"      content="Nexus" />
  <link rel="canonical"    href="https://nexhub.nexosites.xyz/" />

  <!-- ── OPEN GRAPH ────────────────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://nexhub.nexosites.xyz/" />
  <meta property="og:title"       content="NexHub — Your Digital Command Center" />
  <meta property="og:description" content="288+ curated websites across AI, gaming, dev tools, design, music, and more. Search, filter, and favourite the web's best tools." />
  <meta property="og:image"       content="https://nexhub.nexosites.xyz/assets/logo-512.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:site_name"   content="NexHub" />

  <!-- ── TWITTER CARD ──────────────────────────────────── -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="NexHub — Your Digital Command Center" />
  <meta name="twitter:description" content="288+ curated websites. Search, filter, favourite." />
  <meta name="twitter:image"       content="https://nexhub.nexosites.xyz/assets/logo-512.png" />

  <!-- ── FAVICONS ──────────────────────────────────────── -->
  <link rel="icon"             href="assets/favicon-32.png" sizes="32x32"  type="image/png" />
  <link rel="icon"             href="assets/favicon-64.png" sizes="64x64"  type="image/png" />
  <link rel="apple-touch-icon" href="assets/logo-192.png" />
  <meta name="theme-color"     content="#7c5cfc" />

  <!-- ── JSON-LD ───────────────────────────────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "NexHub",
    "url": "https://nexhub.nexosites.xyz/",
    "description": "Curated directory of 288+ essential websites across AI, gaming, dev tools, design, music, finance, and more.",
    "author": { "@type": "Person", "name": "Nexus" },
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://nexhub.nexosites.xyz/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ── FONTS ─────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Preconnect to favicon CDN -->
  <link rel="preconnect" href="https://www.google.com" crossorigin/>
  <link rel="dns-prefetch" href="https://www.google.com"/>
  <!-- ── STYLES ────────────────────────────────────────── -->
  <script>
    (function(){ var t=localStorage.getItem('nexhub_theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <link rel="stylesheet" href="style.css" />

  <style>
    @keyframes skeletonPulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.7; }
    }
    .skeleton-card {
      background: #111122;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 18px; height: 160px;
      animation: skeletonPulse 1.6s ease-in-out infinite;
    }
    [data-theme="light"] .skeleton-card { background: #e8e8f0; border-color: rgba(0,0,0,0.06); }
    .skeleton-card:nth-child(2) { animation-delay:.12s }
    .skeleton-card:nth-child(3) { animation-delay:.24s }
    .skeleton-card:nth-child(4) { animation-delay:.36s }
    .skeleton-card:nth-child(5) { animation-delay:.48s }
    .skeleton-card:nth-child(6) { animation-delay:.60s }
    .skeleton-line { height:11px; border-radius:6px; background:rgba(255,255,255,0.07); margin-bottom:10px; }
    [data-theme="light"] .skeleton-line { background: rgba(0,0,0,0.1); }
    .skeleton-line.w60 { width:60% }
    .skeleton-line.w80 { width:80% }
    .skeleton-line.w40 { width:40% }
  </style>
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-bg"       aria-hidden="true"></div>

  <!-- ── HEADER ────────────────────────────────────────── -->
  <header class="header" role="banner">
    <div class="header-inner">

      <!-- Logo -->
      <a href="/" class="logo" aria-label="NexHub home">
        <img src="assets/logo.png"
             alt="NexHub logo"
             class="logo-img"
             width="36" height="36"
             loading="eager"
             decoding="async" />
        <span class="logo-text">NexHub</span>
      </a>

      <!-- Controls (search + count + submit) -->
      <div class="header-controls" role="search">
        <div class="search-wrap">
          <svg class="search-icon" aria-hidden="true" width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="2"/>
            <path d="m15 15 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="search"
                 id="searchInput"
                 aria-label="Search sites"
                 placeholder="Search 288+ sites…"
                 autocomplete="off"
                 spellcheck="false" />
          <kbd aria-hidden="true">Ctrl K</kbd>
        </div>
        <div class="site-count" id="siteCount" aria-live="polite">Loading…</div>
        <a href="/pages/contact/" class="submit-nav-btn" aria-label="Submit a site">
          <span class="submit-nav-icon" aria-hidden="true">+</span>
          <span class="submit-nav-label">Submit</span>
        </a>
      </div>

      <!-- Right side: theme toggle + hamburger -->
      <div class="header-right">
        <!-- Light/Dark toggle -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" title="Toggle theme">
          <span class="theme-icon theme-icon-dark" aria-hidden="true">
            <!-- Moon -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          <span class="theme-icon theme-icon-light" aria-hidden="true">
            <!-- Sun -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </span>
        </button>

        <!-- Hamburger button -->
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
          <span class="ham-bar"></span>
          <span class="ham-bar"></span>
          <span class="ham-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── MOBILE / DESKTOP MENU ─────────────────────────── -->
  <div class="nav-menu" id="mobileMenu" aria-hidden="true">
    <div class="nav-menu-inner">
      <nav class="nav-menu-links" aria-label="Site navigation">
        <a href="/" class="nav-link nav-link--active">🏠 Home</a>
        <a href="/pages/tools/" class="nav-link">🛠️ Mini Tools</a>
        <a href="/pages/about/" class="nav-link">👤 About</a>
        <a href="/pages/contact/" class="nav-link">📬 Submit a Site</a>
        <a href="/pages/donate/" class="nav-link">💜 Donate</a>
      </nav>
      <div class="nav-menu-footer">
        <span>NexHub by <code>Nexus</code></span>
      </div>
    </div>
  </div>
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <!-- ── CATEGORY NAV ──────────────────────────────────── -->
  <nav class="cat-nav" id="catNav" aria-label="Site categories">
    <button class="cat-scroll-btn" id="scrollLeft"  aria-label="Scroll categories left">‹</button>
    <div class="cat-nav-inner" id="catNavInner" role="tablist">
      <button class="cat-btn active" data-cat="all" role="tab" aria-selected="true">✦ All</button>
    </div>
    <button class="cat-scroll-btn" id="scrollRight" aria-label="Scroll categories right">›</button>
  </nav>

  <!-- ── MAIN ──────────────────────────────────────────── -->
  <main class="main" id="main">
    <div class="section-label" id="sectionLabel" aria-live="polite">All Sites</div>

    <div class="cards-grid" id="cardsGrid" role="list">
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div></div>
      <div class="skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
    </div>

    <div class="empty-state" id="emptyState" style="display:none" role="status">
      <div class="empty-icon">◌</div>
      <p>Nothing found for "<span id="emptyQuery"></span>"</p>
    </div>
  </main>

  <!-- ── FOOTER ────────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <span>NexHub — Your digital command center</span>
    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="/pages/about/">About</a>
      <a href="/pages/tools/">Tools</a>
      <a href="/pages/contact/">Submit</a>
      <a href="/pages/donate/">Donate</a>
    </nav>
    <span>Built by <code>Nexus</code> ♥</span>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
