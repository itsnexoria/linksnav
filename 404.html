  <!-- ── SITE DETAIL PAGE STYLES (used when path is /site/[slug]/) ── -->
  <style>
    /* 404 page */
    .notfound-wrap {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px 24px; text-align:center; position:relative; z-index:1;
    }
    .notfound-code {
      font-family:var(--font-d); font-size:clamp(5rem,20vw,9rem); font-weight:800;
      letter-spacing:-.05em; line-height:1;
      background:linear-gradient(120deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px;
    }
    .notfound-title { font-family:var(--font-d); font-size:1.5rem; font-weight:700; margin-bottom:12px; }
    .notfound-sub { font-size:.85rem; color:var(--muted); margin-bottom:32px; line-height:1.7; }
    .notfound-btn {
      display:inline-flex; align-items:center; gap:8px; padding:11px 28px; border-radius:100px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; text-decoration:none; font-family:var(--font-m); font-size:.82rem;
      transition:transform .2s,box-shadow .2s;
    }
    .notfound-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,92,252,.35); }

    /* Site detail page (reused from /site/index.html) */
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
    @keyframes spin { to { transform:rotate(360deg) } }
    .site-detail-wrap { max-width:760px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:1; }
    .back-link { display:inline-flex; align-items:center; gap:6px; font-size:.78rem; color:var(--muted); text-decoration:none; margin-bottom:32px; transition:color .18s, gap .18s; }
    .back-link:hover { color:var(--accent); gap:10px; }
    .sd-hero { display:flex; align-items:flex-start; gap:20px; margin-bottom:28px; animation:fadeUp .4s ease both; }
    .sd-preview { width:100%; max-height:320px; object-fit:cover; border-radius:var(--radius-lg); border:1px solid var(--border); margin-bottom:24px; display:block; animation:fadeUp .45s .03s ease both; }
    .sd-favicon { width:56px; height:56px; border-radius:14px; flex-shrink:0; background:var(--surface); border:1px solid var(--border); object-fit:contain; padding:4px; }
    .sd-title { font-family:var(--font-d); font-size:clamp(1.5rem,4vw,2rem); font-weight:800; letter-spacing:-.03em; margin:0 0 6px; }
    .sd-url { font-size:.78rem; color:var(--accent); text-decoration:none; word-break:break-all; }
    .sd-url:hover { text-decoration:underline; }
    .sd-badges { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; align-items:center; }
    .detail-cat-badge {
      display:inline-flex; align-items:center; gap:5px;
      font-size:.72rem; font-family:var(--font-m); font-weight:600;
      padding:4px 12px; border-radius:100px; text-decoration:none;
      background:var(--accent-dim); color:var(--accent); border:1px solid rgba(124,92,252,.3);
      transition:filter .18s, transform .18s;
    }
    a.detail-cat-badge:hover { filter:brightness(1.15); transform:translateY(-1px); }
    .sd-body { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; animation:fadeUp .45s .05s ease both; }
    .sd-desc { font-size:.9rem; line-height:1.75; color:var(--text2); }
    .sd-section-label { font-family:var(--font-d); font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:20px 0 10px; }
    .sd-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .sd-health { display:inline-flex; align-items:center; gap:5px; font-size:.72rem; font-family:var(--font-m); font-weight:600; padding:4px 12px; border-radius:100px; }
    .sd-health--up { background:rgba(34,197,94,.1); color:#22c55e; border:1px solid rgba(34,197,94,.25) }
    .sd-health--down { background:rgba(239,68,68,.1); color:#ef4444; border:1px solid rgba(239,68,68,.3) }
    .sd-health--unknown { background:var(--surface2); color:var(--muted); border:1px solid var(--border2) }
    .sd-actions { display:flex; gap:10px; flex-wrap:wrap; animation:fadeUp .5s .1s ease both; }
    .sd-action-btn { display:inline-flex; align-items:center; gap:7px; padding:11px 22px; border-radius:100px; text-decoration:none; font-family:var(--font-m); font-size:.82rem; font-weight:600; transition:transform .18s, box-shadow .18s; border:1px solid var(--border2); cursor:pointer; }
    .sd-action-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent; }
    .sd-action-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,92,252,.35); }
    .sd-action-secondary { background:var(--surface); color:var(--text2); }
    .sd-action-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .sd-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; animation:fadeUp .5s .15s ease both; }
    .sd-meta-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
    .sd-meta-label { font-size:.65rem; font-family:var(--font-m); font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
    .sd-meta-value { font-size:.86rem; font-weight:600; }
    .sd-similar-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .sd-similar-card { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:var(--radius); background:var(--surface); border:1px solid var(--border); text-decoration:none; color:var(--text); font-size:.82rem; font-weight:600; transition:border-color .18s, transform .15s; }
    .sd-similar-card:hover { border-color:var(--accent); transform:translateY(-1px); }
    .sd-similar-fav { width:18px; height:18px; border-radius:4px; flex-shrink:0; background:var(--bg3); }
    .sd-similar-arrow { margin-left:auto; color:var(--muted); font-size:.75rem; flex-shrink:0; }
    .sd-loading { display:flex; justify-content:center; padding:80px 0; }
    .loading-spin { display:inline-block; width:24px; height:24px; border:3px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }

    /* Category / Tag pages */
    .ct-wrap { max-width:1100px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:1; }
    .ct-hero { margin-bottom:28px; animation:fadeUp .35s ease both; }
    .ct-eyebrow { font-size:.68rem; font-family:var(--font-m); font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:8px; }
    .ct-title { font-family:var(--font-d); font-size:clamp(1.6rem,4vw,2.2rem); font-weight:800; letter-spacing:-.03em; margin:0 0 8px; }
    .ct-sub { font-size:.85rem; color:var(--text2); line-height:1.6; }
    .ct-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .ct-card {
      display:flex; flex-direction:column; gap:8px;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
      overflow:hidden; transition:transform .18s, border-color .2s, box-shadow .2s;
      animation:fadeUp .3s ease both;
    }
    .ct-card:hover { transform:translateY(-2px); border-color:var(--border2); box-shadow:var(--shadow-sm); }
    .ct-card-link { display:flex; flex-direction:column; gap:7px; padding:14px 14px 10px; flex:1; text-decoration:none; color:var(--text); }
    .ct-card-top { display:flex; align-items:center; gap:8px; }
    .ct-card-fav { width:22px; height:22px; border-radius:6px; flex-shrink:0; background:var(--bg3); }
    .ct-card-name { font-family:var(--font-d); font-weight:700; font-size:.92rem; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ct-card-arrow { color:var(--muted); font-size:.85rem; flex-shrink:0; }
    .ct-card-desc { font-size:.76rem; color:var(--text2); line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .ct-card-tags { display:flex; flex-wrap:wrap; gap:4px; padding:0 14px 10px; border-top:1px solid var(--border); padding-top:8px; }
    .ct-empty { text-align:center; padding:60px 20px; }
    .ct-empty-icon { font-size:2.5rem; margin-bottom:12px; opacity:.4; }
  </style>

<body>
  <a href="#mainContent" class="skip-link">Skip to content</a>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <!-- Content rendered by JS below -->
  <div id="pageContent"></div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script>
    /* ── ROUTER: detect path type and render accordingly ──
       NOTE: dispatch is deferred to the bottom of this script, after
       SUPABASE_URL/BASE and all render* functions are defined, to avoid
       a temporal-dead-zone ReferenceError (const used before its line runs). */
    const path = window.location.pathname;
    const siteMatch    = path.match(/^\/site\/([^\/]+)\/?$/);
    const categoryMatch = path.match(/^\/category\/([^\/]+)\/?$/);
    const tagMatch     = path.match(/^\/tag\/([^\/]+)\/?$/);
    const blogMatch    = path.match(/^\/blog\/([^\/]+)\/?$/);

    /* ═══════════════════════════════════════════════════════════
       SITE DETAIL PAGE
    ═══════════════════════════════════════════════════════════ */
    const SUPABASE_URL = 'https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';
    const BASE = 'https://app.nexosites.xyz';

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fav(url){ try{ return 'https://www.google.com/s2/favicons?domain='+new URL(url).hostname+'&sz=64'; }catch{ return ''; } }
    function timeAgo(iso){
      const m=Math.round((Date.now()-new Date(iso).getTime())/60000);
      if(m<1) return 'just now'; if(m<60) return m+'m ago';
      const h=Math.round(m/60); if(h<24) return h+'h ago';
      return Math.round(h/24)+'d ago';
    }

    function setMeta(site, catLabel){
      document.title = `${site.name} — Nexo Hub`;
      const desc = `${site.name}: ${(site.description||'').slice(0,140)}`;
      const canonical = `${BASE}/site/${site.slug}/`;
      const ogImg = `https://tiupkpabwuefclbrpaef.supabase.co/functions/v1/og-image?slug=${encodeURIComponent(site.slug)}`;

      const head = document.head;
      const setMeta = (sel, attr, val) => {
        let el = head.querySelector(sel); if(!el){ el=document.createElement('meta'); head.appendChild(el); }
        el.setAttribute(attr, val);
      };
      const setLink = (rel, val) => {
        let el = head.querySelector(`link[rel="${rel}"]`); if(!el){ el=document.createElement('link'); el.rel=rel; head.appendChild(el); }
        el.href = val;
      };

      setMeta('meta[name="description"]', 'content', desc);
      setLink('canonical', canonical);
      setMeta('meta[property="og:title"]', 'content', `${site.name} — Nexo Hub`);
      setMeta('meta[property="og:description"]', 'content', desc);
      setMeta('meta[property="og:image"]', 'content', ogImg);
      setMeta('meta[property="og:image:width"]', 'content', '1200');
      setMeta('meta[property="og:image:height"]', 'content', '630');
      setMeta('meta[property="og:type"]', 'content', 'website');
      setMeta('meta[name="twitter:card"]', 'content', 'summary_large_image');
      setMeta('meta[name="robots"]', 'content', 'index,follow');

      const jsonld = document.createElement('script');
      jsonld.type = 'application/ld+json';
      jsonld.textContent = JSON.stringify({
        "@context":"https://schema.org","@type":"WebPage",
        "name":site.name,"description":site.description,"url":site.url,
        "isPartOf":{"@type":"WebSite","name":"Nexo Hub","url":BASE+"/"},
        "breadcrumb":{"@type":"BreadcrumbList","itemListElement":[
          {"@type":"ListItem","position":1,"name":"Nexo Hub","item":BASE+"/"},
          {"@type":"ListItem","position":2,"name":catLabel||site.category,"item":BASE+"/?cat="+site.category},
          {"@type":"ListItem","position":3,"name":site.name,"item":canonical}
        ]}
      });
      head.appendChild(jsonld);
    }

    /* Shared page shell: header + nav + main content area */
    function buildShell(mainInnerHTML){
      return `
        <header class="header" role="banner">
          <div class="header-inner">
            <a href="/" class="logo" aria-label="Nexo Hub home">
              <img src="/assets/logo.png" alt="Nexo Hub logo" class="logo-img" width="36" height="36" loading="eager" decoding="async"/>
              <span class="logo-text">Nexo Hub</span>
            </a>
            <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
              <a href="/" class="submit-nav-btn">← Back to Hub</a>
            </div>
            <div class="header-right">
              <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <span class="theme-icon theme-icon-dark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                <span class="theme-icon theme-icon-light" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/></svg></span>
              </button>
              <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
                <span class="ham-bar"></span><span class="ham-bar"></span><span class="ham-bar"></span>
              </button>
            </div>
          </div>
        </header>
        <div class="nav-menu" id="mobileMenu" aria-hidden="true">
          <div class="nav-menu-inner">
            <nav class="nav-menu-links" aria-label="Site navigation">
              <a href="/" class="nav-link">🏠 Home</a>
              <a href="/category/" class="nav-link">🗂️ Categories</a>
              <a href="/tag/" class="nav-link">🏷️ Tags</a>
              <a href="/tools/" class="nav-link">🛠️ Web Tools</a>
              <a href="/leaderboard/" class="nav-link">🏆 Leaderboard</a>
              <a href="/new/" class="nav-link">🆕 What's New</a>
              <a href="/contact/" class="nav-link">📬 Submit a Site</a>
              <a href="/about/" class="nav-link">👤 About</a>
              <a href="/settings/" class="nav-link">⚙️ Settings</a>
            </nav>
            <div class="nav-menu-footer"><span>Nexo Hub by <code>Nexus</code></span></div>
          </div>
        </div>
        <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>
        <main id="mainContent">${mainInnerHTML}</main>`;
    }

    async function renderSiteDetailPage(slug){
      document.getElementById('pageContent').innerHTML = buildShell(
        `<div class="site-detail-wrap"><a href="/" class="back-link">← All Sites</a><div id="sdContent"><div class="sd-loading"><span class="loading-spin"></span></div></div></div>`
      );

      initNav();
      await loadSite(slug);
    }

    async function loadSite(slug){
      try{
        const [siteRes, catRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/rpc/get_site_by_slug`, {
            method:'POST',
            headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json' },
            body: JSON.stringify({ p_slug: slug })
          }),
          fetch(`${SUPABASE_URL}/rest/v1/categories?select=id,label,icon`, {
            headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}` }
          })
        ]);

        const sites = await siteRes.json();
        const cats = await catRes.json();
        const site = Array.isArray(sites) ? sites[0] : sites;

        if(!site){ renderSiteNotFound(); return; }

        const cat = cats.find(c=>c.id===site.category);
        const catLabel = cat ? `${cat.icon} ${cat.label}` : site.category;
        setMeta(site, cat ? cat.label : site.category);
        renderSite(site, catLabel);
        loadSimilarSites(site.id);
      }catch{
        renderSiteNotFound();
      }
    }

    function renderSite(site, catLabel){
      const faviconUrl = fav(site.url);
      const tags = (site.tags||[]).map(t=>{
        const bg=(site.tag_colors||{})[t]||'#6b7280';
        return `<a class="tag" href="/tag/${esc(encodeURIComponent(t))}/" style="--tag-bg:${esc(bg)}">${esc(t)}</a>`;
      }).join('');
      const health = (()=>{
        if(!site.last_checked_at) return `<span class="sd-health sd-health--unknown">○ Not yet checked</span>`;
        if(site.health_status==='up') return `<span class="sd-health sd-health--up">● Healthy · checked ${esc(timeAgo(site.last_checked_at))}</span>`;
        return `<span class="sd-health sd-health--down">⚠ May be down · HTTP ${site.http_status||'no response'} · checked ${esc(timeAgo(site.last_checked_at))}</span>`;
      })();
      const addedDate = site.created_at ? new Date(site.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';

      document.getElementById('sdContent').innerHTML = `
        <nav class="breadcrumb-trail" aria-label="Breadcrumb">
          <a href="/">Home</a><span class="bc-sep">/</span><a href="/category/${esc(site.category)}/">${esc(catLabel)}</a><span class="bc-sep">/</span><span class="bc-current">${esc(site.name)}</span>
        </nav>
        <div class="sd-hero">
          ${faviconUrl?`<img class="sd-favicon" src="${esc(faviconUrl)}" alt="${esc(site.name)} favicon" onerror="this.style.display='none'"/>`:''}
          <div>
            <h1 class="sd-title">${esc(site.name)}</h1>
            <a class="sd-url" href="${esc(site.url)}" target="_blank" rel="noopener noreferrer">${esc(site.url)}</a>
            <div class="sd-badges">
            <a class="detail-cat-badge" href="/category/${esc(site.category)}/">${esc(catLabel)}</a>
              ${health}
            </div>
          </div>
        </div>
        <img class="sd-preview" src="https://tiupkpabwuefclbrpaef.supabase.co/functions/v1/og-image?slug=${esc(site.slug)}" alt="${esc(site.name)} preview" loading="lazy" onerror="this.remove()"/>
        <div class="sd-body">
          <p class="sd-desc">${esc(site.description)}</p>
          ${tags?`<div class="sd-section-label">Tags</div><div class="sd-tags">${tags}</div>`:''}
        </div>
        <div class="sd-actions">
          <a class="sd-action-btn sd-action-primary" href="${esc(site.url)}" target="_blank" rel="noopener noreferrer">↗ Visit Site</a>
          <button class="sd-action-btn sd-action-secondary" onclick="copyLink()">🔗 Copy Link</button>
          <button class="sd-action-btn sd-action-secondary" onclick="shareTwitter('${esc(site.url)}','${esc(site.name)}')">𝕏 Share</button>
          <button class="sd-action-btn sd-action-secondary" onclick="shareWhatsApp('${esc(site.url)}','${esc(site.name)}')">💬 WhatsApp</button>
          <button class="sd-action-btn sd-action-secondary" id="sdReportBtn" onclick="toggleReport()">⚠ Report</button>
          <a class="sd-action-btn sd-action-secondary" href="/">← Back to Hub</a>
        </div>
        <div class="sm-report-form" id="sdReportForm" style="display:none;margin-bottom:24px">
          <div class="sm-report-label">What's the issue?</div>
          <div class="sm-report-reasons">
            <button class="sm-reason-btn" data-reason="broken_link" onclick="selectReason(this)">🔗 Broken link</button>
            <button class="sm-reason-btn" data-reason="wrong_info" onclick="selectReason(this)">📝 Wrong info</button>
            <button class="sm-reason-btn" data-reason="spam_or_scam" onclick="selectReason(this)">🚫 Spam/scam</button>
            <button class="sm-reason-btn" data-reason="duplicate" onclick="selectReason(this)">📋 Duplicate</button>
            <button class="sm-reason-btn" data-reason="site_down" onclick="selectReason(this)">⛔ Site is down</button>
            <button class="sm-reason-btn" data-reason="other" onclick="selectReason(this)">❓ Other</button>
          </div>
          <textarea class="sm-report-note" id="sdReportNote" placeholder="Optional details… (max 500 chars)" maxlength="500"></textarea>
          <button class="sm-report-submit" id="sdReportSubmit" onclick="submitReport('${esc(site.id)}')" disabled>Submit Report</button>
        </div>
        <div class="sd-section-label" style="margin-top:28px">About this listing</div>
        <div class="sd-meta-grid">
          <div class="sd-meta-card"><div class="sd-meta-label">Category</div><div class="sd-meta-value">${esc(catLabel)}</div></div>
          <div class="sd-meta-card"><div class="sd-meta-label">Added to Nexo Hub</div><div class="sd-meta-value">${esc(addedDate)}</div></div>
        </div>
        <div class="sd-section-label" style="margin-top:28px">You might also like</div>
        <div class="sd-similar-grid" id="similarGrid">
          <div style="grid-column:1/-1;text-align:center;padding:20px"><span class="loading-spin"></span></div>
        </div>`;
    }

    function shareTwitter(url, name){
      const text = `🔗 Just found "${name}" on Nexo Hub — check it out`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'width=600,height=400,noopener');
    }
    function shareWhatsApp(url, name){
      const text = `🔗 Check out "${name}" — ${url}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank', 'noopener');
    }
    function toggleReport(){
      const form = document.getElementById('sdReportForm');
      const btn = document.getElementById('sdReportBtn');
      const open = form.style.display === 'none';
      form.style.display = open ? 'block' : 'none';
      btn.classList.toggle('active', open);
    }
    function selectReason(btn){
      document.querySelectorAll('.sm-reason-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('sdReportSubmit').disabled = false;
    }
    async function submitReport(siteId){
      const reason = document.querySelector('.sm-reason-btn.selected')?.dataset.reason;
      if(!reason) return;
      const note = document.getElementById('sdReportNote')?.value.trim() || null;
      const btn = document.getElementById('sdReportSubmit');
      btn.disabled = true; btn.textContent = 'Sending…';
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/submit_report`, {
          method:'POST', headers:{ ...sbH(), 'Content-Type':'application/json' },
          body: JSON.stringify({ input_site_id: siteId, input_reason: reason, input_note: note })
        });
        if(!res.ok) throw new Error();
        document.getElementById('sdReportForm').innerHTML = '<div class="sm-report-success">✓ Thanks — we\'ll look into it.</div>';
      }catch{
        btn.disabled = false; btn.textContent = 'Submit Report';
      }
    }

    async function loadSimilarSites(siteId){
      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_similar_sites`, {
          method:'POST',
          headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json' },
          body: JSON.stringify({ input_site_id: siteId, result_limit: 4 })
        });
        const grid = document.getElementById('similarGrid');
        if(!grid||!res.ok){ if(grid) grid.style.display='none'; return; }
        const similar = await res.json();
        if(!similar.length){ grid.style.display='none'; return; }
        grid.innerHTML = similar.map(s=>`
          <a class="sd-similar-card" href="${esc(s.slug?'/site/'+s.slug+'/':s.url)}" ${!s.slug?'target="_blank" rel="noopener noreferrer"':''}>
            <img class="sd-similar-fav" src="${esc(fav(s.url))}" alt="${esc(s.name)} favicon" loading="lazy" onerror="this.style.display='none'"/>
            <span>${esc(s.name)}</span>
            <span class="sd-similar-arrow">↗</span>
          </a>`).join('');
      }catch{
        const grid=document.getElementById('similarGrid');
        if(grid) grid.style.display='none';
      }
    }

    function renderSiteNotFound(){
      const el = document.getElementById('sdContent');
      if(el) el.innerHTML = `
        <div style="text-align:center;padding:80px 20px">
          <div style="font-size:3rem">🔍</div>
          <h1 style="font-family:var(--font-d);font-size:1.5rem;margin:12px 0 8px">Site not found</h1>
          <p style="color:var(--muted);font-size:.85rem">This listing may have been removed or the URL is incorrect.</p>
          <a class="sd-action-btn sd-action-primary" href="/" style="margin-top:20px;display:inline-flex">← Browse all sites</a>
        </div>`;
    }

    function copyLink(){
      const url=location.href;
      if(navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>legacyCopy(url));
      else legacyCopy(url);
    }
    function legacyCopy(url){
      const ta=document.createElement('textarea');ta.value=url;
      ta.style.position='fixed';ta.style.left='-9999px';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');
      document.body.removeChild(ta);
    }

    /* ═══════════════════════════════════════════════════════════
       CATEGORY PAGE
    ═══════════════════════════════════════════════════════════ */
    async function renderCategoryPage(catId){
      document.getElementById('pageContent').innerHTML = buildShell('');
      initNav();
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="ct-wrap"><div class="sd-loading"><span class="loading-spin"></span></div></div>`;

      try{
        const [catsRes, sitesRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/categories?id=eq.${encodeURIComponent(catId)}&select=*`,{headers:sbH()}),
          fetch(`${SUPABASE_URL}/rest/v1/sites?category=eq.${encodeURIComponent(catId)}&status=eq.approved&select=*&order=name.asc`,{headers:sbH()})
        ]);
        const cats = await catsRes.json();
        const sites = await sitesRes.json();
        const cat = cats[0];
        if(!cat){ render404(); return; }

        document.title = `${cat.icon} ${cat.label} — Nexo Hub`;
        setHeadMeta(`${cat.icon} ${cat.label} — Nexo Hub`,
          `Browse ${sites.length} curated ${cat.label} sites on Nexo Hub — hand-picked and reviewed.`,
          `https://app.nexosites.xyz/category/${catId}/`,
          [
            { name:'Nexo Hub', url:BASE+'/' },
            { name:'Categories', url:BASE+'/category/' },
            { name:cat.label, url:`${BASE}/category/${catId}/` }
          ],
          `https://tiupkpabwuefclbrpaef.supabase.co/functions/v1/og-collection-image?type=category&id=${encodeURIComponent(catId)}`,
          `${cat.label} on Nexo Hub`);

        content.innerHTML = `<div class="ct-wrap">
          <a href="/category/" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .18s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">← All Categories</a>
          <div class="ct-hero">
            <div class="ct-eyebrow">Category</div>
            <h1 class="ct-title">${esc(cat.icon)} ${esc(cat.label)}</h1>
            <p class="ct-sub">${sites.length} curated site${sites.length!==1?'s':''} in ${esc(cat.label)}</p>
          </div>
          ${sites.length ? `<div class="ct-grid">${sites.map((s,i)=>siteCardHTML(s,i)).join('')}</div>`
            : `<div class="ct-empty"><div class="ct-empty-icon">🌱</div><p style="color:var(--muted)">No sites in this category yet.</p></div>`}
        </div>`;
      }catch{ render404(); }
    }

    /* ═══════════════════════════════════════════════════════════
       TAG PAGE
    ═══════════════════════════════════════════════════════════ */
    async function renderTagPage(tag){
      document.getElementById('pageContent').innerHTML = buildShell('');
      initNav();
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="ct-wrap"><div class="sd-loading"><span class="loading-spin"></span></div></div>`;

      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/sites?tags=cs.{${encodeURIComponent(tag)}}&status=eq.approved&select=*&order=name.asc`,{headers:sbH()});
        const sites = await res.json();

        document.title = `#${tag} — Nexo Hub`;
        setHeadMeta(`#${tag} — Nexo Hub`,
          `${sites.length} curated site${sites.length!==1?'s':''} tagged "${tag}" on Nexo Hub.`,
          `https://app.nexosites.xyz/tag/${tag}/`,
          [
            { name:'Nexo Hub', url:BASE+'/' },
            { name:'Tags', url:BASE+'/tag/' },
            { name:'#'+tag, url:`${BASE}/tag/${tag}/` }
          ],
          `https://tiupkpabwuefclbrpaef.supabase.co/functions/v1/og-collection-image?type=tag&id=${encodeURIComponent(tag)}`,
          `#${tag} on Nexo Hub`);

        content.innerHTML = `<div class="ct-wrap">
          <a href="/tag/" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:28px;transition:color .18s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">← All Tags</a>
          <div class="ct-hero">
            <div class="ct-eyebrow">Tag</div>
            <h1 class="ct-title">🏷️ ${esc(tag)}</h1>
            <p class="ct-sub">${sites.length} site${sites.length!==1?'s':''} tagged <strong>${esc(tag)}</strong></p>
          </div>
          ${sites.length ? `<div class="ct-grid">${sites.map((s,i)=>siteCardHTML(s,i)).join('')}</div>`
            : `<div class="ct-empty"><div class="ct-empty-icon">🔍</div><p style="color:var(--muted)">No sites found for this tag.</p></div>`}
        </div>`;
      }catch{ render404(); }
    }

    /* Shared site card for category/tag pages */
    function siteCardHTML(s, i){
      const fav_ = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(new URL(s.url||'https://x.com').hostname)}&sz=32`;
      const tags = (s.tags||[]).slice(0,3).map(t=>{
        const bg=(s.tag_colors||{})[t]||'#6b7280';
        return `<span class="tag" style="--tag-bg:${esc(bg)}">${esc(t)}</span>`;
      }).join('');
      const href = s.slug ? `/site/${esc(s.slug)}/` : esc(s.url);
      const isExt = !s.slug;
      const downBadge = s.health_status==='down'?`<span class="health-badge">⚠ May be down</span>`:'';
      return `<div class="ct-card" style="animation-delay:${Math.min(i*0.03,0.4)}s">
        <a class="ct-card-link" href="${href}" ${isExt?'target="_blank" rel="noopener noreferrer"':''}>
          <div class="ct-card-top">
            <img class="ct-card-fav" src="${esc(fav_)}" alt="${esc(s.name)} favicon" loading="lazy" onerror="this.style.display='none'"/>
            <span class="ct-card-name">${esc(s.name)}</span>
            <span class="ct-card-arrow">↗</span>
          </div>
          <p class="ct-card-desc">${esc(s.description||'')}</p>
        </a>
        ${tags||downBadge?`<div class="ct-card-tags">${tags}${downBadge}</div>`:''}
      </div>`;
    }

    /* Shared helpers */
    /* ═══════════════════════════════════════════════════════════
       BLOG POST PAGE
    ═══════════════════════════════════════════════════════════ */
    async function renderBlogPage(slug){
      document.getElementById('pageContent').innerHTML = buildShell('');
      initNav();
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="ct-wrap"><div class="sd-loading"><span class="loading-spin"></span></div></div>`;

      try{
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_blog_post_by_slug`, {
          method:'POST', headers:{ ...sbH(), 'Content-Type':'application/json' },
          body: JSON.stringify({ p_slug: slug })
        });
        const posts = await res.json();
        const post = Array.isArray(posts) ? posts[0] : posts;
        if(!post){ render404(); return; }

        const desc = post.excerpt || post.title;
        document.title = `${post.title} — Nexo Hub Blog`;
        setHeadMeta(`${post.title} — Nexo Hub Blog`, desc,
          `https://app.nexosites.xyz/blog/${slug}/`,
          [
            { name:'Nexo Hub', url:BASE+'/' },
            { name:'Blog', url:BASE+'/blog/' },
            { name:post.title, url:`${BASE}/blog/${slug}/` }
          ],
          `${BASE}/assets/logo-512.png`, post.title);

        const dateStr = post.created_at ? new Date(post.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '';

        content.innerHTML = `<div class="ct-wrap" style="max-width:720px">
          <a href="/blog/" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:28px">← All Posts</a>
          <div class="sd-hero">
            <div>
              <div style="font-size:2.2rem;line-height:1;margin-bottom:10px">${esc(post.emoji||'📰')}</div>
              <h1 class="sd-title">${esc(post.title)}</h1>
              <div style="font-size:.78rem;color:var(--muted);margin-top:6px">${esc(dateStr)}</div>
            </div>
          </div>
          <div class="sd-body" style="font-size:.92rem;line-height:1.8">${post.body||''}</div>
          <div class="sd-actions">
            <button class="sd-action-btn sd-action-secondary" onclick="copyLink()">🔗 Copy Link</button>
            <a class="sd-action-btn sd-action-secondary" href="/blog/">← All Posts</a>
          </div>
        </div>`;
      }catch{ render404(); }
    }

    function sbH(){ return {'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}; }

    function setHeadMeta(title, desc, canonical, breadcrumbItems, ogImage, ogImageAlt){
      document.title = title;
      let m = document.querySelector('meta[name="description"]');
      if(!m){m=document.createElement('meta');m.name='description';document.head.appendChild(m);} m.content=desc;
      let og = document.querySelector('meta[property="og:title"]');
      if(!og){og=document.createElement('meta');og.setAttribute('property','og:title');document.head.appendChild(og);} og.content=title;
      let ogd = document.querySelector('meta[property="og:description"]');
      if(!ogd){ogd=document.createElement('meta');ogd.setAttribute('property','og:description');document.head.appendChild(ogd);} ogd.content=desc;
      let can = document.querySelector('link[rel="canonical"]');
      if(!can){can=document.createElement('link');can.rel='canonical';document.head.appendChild(can);} can.href=canonical;
      let robots = document.querySelector('meta[name="robots"]');
      if(robots) robots.content='index,follow';

      if(ogImage){
        let ogi = document.querySelector('meta[property="og:image"]');
        if(!ogi){ogi=document.createElement('meta');ogi.setAttribute('property','og:image');document.head.appendChild(ogi);} ogi.content=ogImage;
        let ogia = document.querySelector('meta[property="og:image:alt"]');
        if(!ogia){ogia=document.createElement('meta');ogia.setAttribute('property','og:image:alt');document.head.appendChild(ogia);} ogia.content=ogImageAlt||title;
        let twi = document.querySelector('meta[name="twitter:image"]');
        if(!twi){twi=document.createElement('meta');twi.name='twitter:image';document.head.appendChild(twi);} twi.content=ogImage;
        let twc = document.querySelector('meta[name="twitter:card"]');
        if(!twc){twc=document.createElement('meta');twc.name='twitter:card';document.head.appendChild(twc);} twc.content='summary_large_image';
      }

      if(breadcrumbItems && breadcrumbItems.length){
        document.getElementById('breadcrumbLd')?.remove();
        const ld = document.createElement('script');
        ld.type = 'application/ld+json';
        ld.id = 'breadcrumbLd';
        ld.textContent = JSON.stringify({
          "@context":"https://schema.org","@type":"BreadcrumbList",
          "itemListElement": breadcrumbItems.map((it,i)=>({"@type":"ListItem","position":i+1,"name":it.name,"item":it.url}))
        });
        document.head.appendChild(ld);
      }
    }

    /* ═══════════════════════════════════════════════════════════
       PLAIN 404 PAGE
    ═══════════════════════════════════════════════════════════ */
    function render404(){
      document.title = '404 — Nexo Hub';
      document.getElementById('pageContent').innerHTML = `
        <div class="notfound-wrap">
          <div class="notfound-code">404</div>
          <h1 class="notfound-title">Page not found</h1>
          <p class="notfound-sub">Looks like this URL doesn't exist.<br/>Let's get you back to the hub.</p>
          <a href="/" class="notfound-btn">← Back to Nexo Hub</a>
        </div>`;
    }

    /* ── NAV INIT ─────────────────────────────────────────────── */
    function initNav(){
      const btn=document.getElementById('themeToggle');
      if(btn) btn.addEventListener('click',function(){
        const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
        document.documentElement.setAttribute('data-theme',next);
        localStorage.setItem('nexhub_theme',next);
        try{ const p=JSON.parse(localStorage.getItem('nexhub_prefs')||'{}');p.theme=next;localStorage.setItem('nexhub_prefs',JSON.stringify(p));}catch{}
      });
      const ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      if(!ham) return;
      function openM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function closeM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      ham.addEventListener('click',function(){ham.classList.contains('is-open')?closeM():openM();});
      if(ov) ov.addEventListener('click',closeM);
      document.addEventListener('keydown',function(e){if(e.key==='Escape')closeM();});
    }

    /* ── ROUTER DISPATCH ──
       Runs here, at the bottom, so every const/function it depends on
       (SUPABASE_URL, renderCategoryPage, renderTagPage, etc.) already exists. */
    if (siteMatch)          { renderSiteDetailPage(siteMatch[1]); }
    else if (categoryMatch) { renderCategoryPage(categoryMatch[1]); }
    else if (tagMatch)      { renderTagPage(tagMatch[1]); }
    else if (blogMatch)     { renderBlogPage(blogMatch[1]); }
    else                    { render404(); }
  </script>
  <script src="/pwa-register.js" defer></script>
