<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Tags — Nexo Hub</title>
  <meta name="description" content="Browse sites on Nexo Hub by tag — free, freemium, open-source, AI, security, streaming, and more. Find exactly what you're looking for."/>
  <link rel="canonical" href="https://app.nexosites.xyz/tag/"/>
  <meta property="og:title" content="All Tags — Nexo Hub"/>
  <meta property="og:description" content="Browse 490+ curated sites by tag — free tools, open-source software, AI apps, security tools, and more."/>
  <meta property="og:image" content="https://app.nexosites.xyz/assets/logo-512.png"/>
  <meta property="og:image:alt" content="Nexo Hub Tags"/>
  <meta name="theme-color" content="#7c5cfc"/>
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png"/>
  <link rel="apple-touch-icon" href="/assets/logo-192.png"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="/nexo-prefs.js"></script>
  <link rel="stylesheet" href="../style.css?v=20260629-15"/>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .tag-index-wrap { max-width:900px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:1; }
    .tag-index-hero { margin-bottom:32px; animation:fadeUp .35s ease both; }
    .tag-index-title { font-family:var(--font-d); font-size:clamp(1.6rem,4vw,2.2rem); font-weight:800; letter-spacing:-.03em; margin:0 0 8px; }
    .tag-index-sub { font-size:.85rem; color:var(--text2); }
    .tag-cloud { display:flex; flex-wrap:wrap; gap:8px; }
    .tag-pill {
      display:inline-flex; align-items:center; gap:7px;
      padding:8px 16px; border-radius:100px; text-decoration:none; color:var(--text);
      background:var(--surface); border:1px solid var(--border);
      font-family:var(--font-m); font-size:.82rem; font-weight:600;
      transition:border-color .18s, transform .15s; animation:fadeUp .35s ease both;
    }
    .tag-pill:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px); }
    .tag-pill-count { font-size:.68rem; color:var(--muted); background:var(--bg3); padding:1px 7px; border-radius:100px; font-weight:700; }
    .loading-spin { display:inline-block; width:22px; height:22px; border:3px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  </style>
</head>
<body>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>
  <header class="header" role="banner">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="Nexo Hub home">
        <img src="/assets/logo.png" alt="Nexo Hub logo" class="logo-img" width="36" height="36" loading="eager" decoding="async"/>
        <h1 class="logo-text">Nexo Hub</h1>
      </a>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <a href="/" class="submit-nav-btn">← Back to Hub</a>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon theme-icon-dark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          <span class="theme-icon theme-icon-light" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false"><span class="ham-bar"></span><span class="ham-bar"></span><span class="ham-bar"></span></button>
      </div>
    </div>
  </header>
  <div class="nav-menu" id="mobileMenu" aria-hidden="true">
    <div class="nav-menu-inner">
      <nav class="nav-menu-links" aria-label="Site navigation">
        <a href="/" class="nav-link">🏠 Home</a>
        <a href="/category/" class="nav-link">🗂️ Categories</a>
        <a href="/tag/" class="nav-link nav-link--active">🏷️ Tags</a>
        <a href="/pages/tools/" class="nav-link">🛠️ Mini Tools</a>
        <a href="/pages/leaderboard/" class="nav-link">🏆 Leaderboard</a>
        <a href="/pages/new/" class="nav-link">🆕 What's New</a>
        <a href="/pages/contact/" class="nav-link">📬 Submit a Site</a>
        <a href="/pages/about/" class="nav-link">👤 About</a>
        <a href="/pages/settings/" class="nav-link">⚙️ Settings</a>
      </nav>
      <div class="nav-menu-footer"><span>Nexo Hub by <code>Nexus</code></span></div>
    </div>
  </div>
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <main class="tag-index-wrap">
    <div class="tag-index-hero">
      <h2 class="tag-index-title">🏷️ All Tags</h2>
      <p class="tag-index-sub">Find sites by tag — pricing, type, features, and more</p>
    </div>
    <div class="tag-cloud" id="tagCloud">
      <div style="width:100%;text-align:center;padding:40px"><span class="loading-spin"></span></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL='https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY='sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    async function load(){
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_all_tags`,{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json'},body:'{}'});
      const tags = await res.json();
      // tags is likely an array of {tag, count} or just strings — handle both
      let items = [];
      if(Array.isArray(tags) && tags.length && typeof tags[0]==='object' && tags[0].tag){
        items = tags.filter(t=>t.site_count>=2).sort((a,b)=>b.site_count-a.site_count);
      } else if(Array.isArray(tags)){
        items = tags.map(t=>({tag:t,site_count:0}));
      }
      if(!items.length){ document.getElementById('tagCloud').innerHTML='<p style="color:var(--muted)">No tags found.</p>'; return; }
      document.getElementById('tagCloud').innerHTML = items.map((t,i)=>`
        <a class="tag-pill" href="/tag/${esc(t.tag)}/" style="animation-delay:${i*0.015}s">
          🏷️ ${esc(t.tag)}
          ${t.site_count?`<span class="tag-pill-count">${t.site_count}</span>`:''}
        </a>`).join('');
    }
    load();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(btn)btn.addEventListener('click',function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('nexhub_theme',n);});
      var ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      function oM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function cM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      if(ham)ham.addEventListener('click',()=>ham.classList.contains('is-open')?cM():oM());
      if(ov)ov.addEventListener('click',cM);
      document.addEventListener('keydown',e=>{if(e.key==='Escape')cM();});
    });
  </script>
  <script src="/pwa-register.js" defer></script>
</body>
</html>
