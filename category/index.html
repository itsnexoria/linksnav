<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Categories — Nexo Hub</title>
  <meta name="description" content="Browse all 35 categories on Nexo Hub — AI, gaming, dev tools, design, music, health, travel, writing, photography, and more."/>
  <link rel="canonical" href="https://app.nexorealm.org/category/"/>
  <meta property="og:title" content="All Categories — Nexo Hub"/>
  <meta property="og:description" content="Browse 620+ curated sites across 35 categories including AI, gaming, dev tools, design, music, health, and travel."/>
  <meta property="og:image" content="https://app.nexorealm.org/assets/logo-512.png"/>
  <meta property="og:image:alt" content="Nexo Hub Categories"/>
  <meta name="theme-color" content="#7c5cfc"/>
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png"/>
  <link rel="apple-touch-icon" href="/assets/logo-192.png"/>
  <link rel="manifest" href="/manifest.webmanifest"/>
  <link rel="alternate" type="application/rss+xml" title="Nexo Hub — What's New" href="/feed.xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="/nexo-prefs.js"></script>
  <link rel="stylesheet" href="../style.css?v=20260714-1"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "All Categories — Nexo Hub",
    "url": "https://app.nexorealm.org/category/",
    "description": "Browse 620+ curated websites organised across 35 categories.",
    "isPartOf": { "@type": "WebSite", "name": "Nexo Hub", "url": "https://app.nexorealm.org/" }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Nexo Hub", "item": "https://app.nexorealm.org/" },
      { "@type": "ListItem", "position": 2, "name": "Categories", "item": "https://app.nexorealm.org/category/" }
    ]
  }
  </script>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .cat-index-wrap { max-width:1080px; margin:0 auto; padding:40px 24px 80px; position:relative; z-index:1; }
    .cat-index-hero { margin-bottom:36px; animation:fadeUp .35s ease both; }
    .cat-index-title { font-family:var(--font-d); font-size:clamp(1.6rem,4vw,2.2rem); font-weight:800; letter-spacing:-.03em; margin:0 0 8px; }
    .cat-index-sub { font-size:.85rem; color:var(--text2); }
    .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    .cat-card {
      display:flex; align-items:center; gap:14px; padding:18px 16px;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
      text-decoration:none; color:var(--text); animation:fadeUp .35s ease both;
      transition:border-color .2s, transform .18s, box-shadow .2s;
    }
    .cat-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow-sm); }
    .cat-icon { font-size:1.6rem; flex-shrink:0; }
    .cat-info { flex:1; min-width:0; }
    .cat-name { font-family:var(--font-d); font-weight:700; font-size:.95rem; letter-spacing:-.01em; }
    .cat-count { font-size:.72rem; color:var(--muted); margin-top:2px; font-family:var(--font-m); }
    .loading-spin { display:inline-block; width:22px; height:22px; border:3px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>
  <header class="header" role="banner">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="Nexo Hub home">
        <img src="/assets/logo.png" alt="Nexo Hub logo" class="logo-img" width="36" height="36" loading="eager" decoding="async"/>
        <span class="logo-text">Nexo Hub</span>
      </a>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <a href="/" class="submit-nav-btn"><i data-lucide="arrow-left" class="lucide-ico" aria-hidden="true"></i> Back to Hub</a>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon theme-icon-dark" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          <span class="theme-icon theme-icon-light" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></span>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false"><span class="ham-bar"></span><span class="ham-bar"></span><span class="ham-bar"></span></button>
      </div>
    </div>
  </header>
  <div class="nav-menu" id="mobileMenu" aria-hidden="true">
    <div class="nav-menu-inner">
      <nav class="nav-menu-links" aria-label="Site navigation">
        <a href="/" class="nav-link"><i data-lucide="home" class="lucide-ico" aria-hidden="true"></i> Home</a>
        <a href="/category/" class="nav-link nav-link--active"><i data-lucide="layout-grid" class="lucide-ico" aria-hidden="true"></i> Categories</a>
        <a href="/tag/" class="nav-link"><i data-lucide="tag" class="lucide-ico" aria-hidden="true"></i> Tags</a>
        <a href="/tools/" class="nav-link"><i data-lucide="wrench" class="lucide-ico" aria-hidden="true"></i> Web Tools</a>
        <a href="/leaderboard/" class="nav-link"><i data-lucide="trophy" class="lucide-ico" aria-hidden="true"></i> Leaderboard</a>
        <a href="/new/" class="nav-link"><i data-lucide="sparkles" class="lucide-ico" aria-hidden="true"></i> What's New</a>
        <a href="/blog/" class="nav-link"><i data-lucide="newspaper" class="lucide-ico" aria-hidden="true"></i> Blog</a>
        <a href="/contact/" class="nav-link"><i data-lucide="send" class="lucide-ico" aria-hidden="true"></i> Submit a Site</a>
        <a href="/about/" class="nav-link"><i data-lucide="user" class="lucide-ico" aria-hidden="true"></i> About</a>
        <a href="/settings/" class="nav-link"><i data-lucide="settings" class="lucide-ico" aria-hidden="true"></i> Settings</a>
      </nav>
      <div class="nav-menu-footer"><span>Nexo Hub by <code>Nexus</code></span></div>
    </div>
  </div>
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <main class="cat-index-wrap" id="main-content">
    <div class="cat-index-hero">
      <h2 class="cat-index-title"><i data-lucide="layout-grid" class="lucide-ico" aria-hidden="true"></i> All Categories</h2>
      <p class="cat-index-sub">620+ curated sites, organised into 35 categories</p>
    </div>
    <div class="cat-grid" id="catGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px"><span class="loading-spin"></span></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL='https://tiupkpabwuefclbrpaef.supabase.co';
    const SUPABASE_ANON_KEY='sb_publishable_Ut5Qh9mJNfK3qaltXgCH6g_Phryct7r';
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function fav(url){try{const{hostname}=new URL(url);return'https://www.google.com/s2/favicons?domain='+hostname+'&sz=64'}catch{return''}}
    const EMOJI_TO_LUCIDE={'🤖':'bot','🧸':'gamepad-2','🏢':'building-2','🎨':'palette','🛠️':'wrench','🛠':'wrench','⬇️':'arrow-down','⬇':'arrow-down','💳':'credit-card','🎮':'gamepad-2','🔵':'circle-dot','☁️':'cloud','☁':'cloud','📚':'book-open','⛏️':'pickaxe','⛏':'pickaxe','🎬':'clapperboard','🎵':'music','🌐':'globe','📰':'newspaper','📋':'clipboard','🔒':'lock','🛒':'shopping-cart','📱':'smartphone','📁':'folder','📺':'tv','⚙️':'settings','⚙':'settings','⚡':'zap','📖':'book-open','🍳':'utensils-crossed','💪':'dumbbell','💼':'briefcase','🗺️':'map','🗺':'map','📷':'camera','🎙️':'mic','🎙':'mic','🏠':'home','🔬':'microscope','🏆':'trophy','✈️':'plane','✈':'plane','⛅':'cloud-sun','✏️':'pencil','✏':'pencil','🔗':'link'};
    function catIconHTML(emoji){return `<i data-lucide="${EMOJI_TO_LUCIDE[emoji]||'folder'}" class="lucide-ico" aria-hidden="true"></i>`;}

    function siteCardHTML(s){
      const color=s.color||'#7c5cfc';
      const imgSrc=fav(s.url);
      const tagHTML=(s.tags||[]).map(t=>{
        const bg=(s.tag_colors||{})[t]||'#6b7280';
        return `<span class="tag" style="--tag-bg:${esc(bg)}">${esc(t)}</span>`;
      }).join('');
      return `<div class="card-wrap">
        <a class="card" href="${esc(s.url)}" target="_blank" rel="noopener noreferrer" style="--card-color:${color}" aria-label="${esc(s.name)}">
          <div class="card-top">
            ${imgSrc?`<img class="card-favicon" src="${esc(imgSrc)}" alt="${esc(s.name)} favicon" width="22" height="22" loading="lazy">`:''}
            <span class="card-name">${esc(s.name)}</span>
            <span class="card-arrow" aria-hidden="true">↗</span>
          </div>
          <p class="card-desc">${esc(s.description)}</p>
          <div class="card-footer">${tagHTML}</div>
        </a>
        <div class="card-actions">
          ${s.slug?`<a class="info-btn" href="/site/${esc(s.slug)}/" aria-label="More info about ${esc(s.name)}"></a>`:''}
        </div>
      </div>`;
    }

    async function loadIndex(){
      const [catsRes, countRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/categories?select=id,label,icon,sort_order&order=sort_order.asc`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}}),
        fetch(`${SUPABASE_URL}/rest/v1/sites?select=category&status=eq.approved`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}})
      ]);
      const cats = await catsRes.json();
      const sites = await countRes.json();
      const counts={};
      sites.forEach(s=>{counts[s.category]=(counts[s.category]||0)+1;});
      document.getElementById('catGrid').innerHTML = cats.map((c,i)=>`
        <a class="cat-card" href="/category/${esc(c.id)}/" style="animation-delay:${i*0.03}s">
          <span class="cat-icon">${catIconHTML(c.icon)}</span>
          <div class="cat-info">
            <div class="cat-name">${esc(c.label)}</div>
            <div class="cat-count">${(counts[c.id]||0).toLocaleString()} site${(counts[c.id]||0)!==1?'s':''}</div>
          </div>
        </a>`).join('');
      if(window.lucide){lucide.createIcons();}
    }

    async function loadCategoryDetail(slug){
      const main = document.getElementById('main-content');
      try{
        const [catRes, sitesRes] = await Promise.all([
          fetch(`${SUPABASE_URL}/rest/v1/categories?id=eq.${encodeURIComponent(slug)}&select=id,label,icon`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}}),
          fetch(`${SUPABASE_URL}/rest/v1/sites?category=eq.${encodeURIComponent(slug)}&status=eq.approved&select=id,name,url,description,tags,tag_colors,color,slug&order=sort_order.asc`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}})
        ]);
        const cats = await catRes.json();
        const cat = cats[0];
        const sites = await sitesRes.json();
        if(!cat){
          main.innerHTML = `<div class="cat-index-wrap"><div style="text-align:center;padding:80px 20px">
            <div style="font-size:3rem"><i data-lucide="layout-grid" class="lucide-ico" aria-hidden="true"></i></div>
            <h1 style="font-family:var(--font-d);font-size:1.5rem;margin:12px 0 8px">Category not found</h1>
            <p style="color:var(--muted);font-size:.85rem">This category may have been removed or the URL is incorrect.</p>
            <a href="/category/" style="display:inline-block;margin-top:20px;padding:9px 20px;border-radius:100px;background:var(--surface);border:1px solid var(--border2);color:var(--text2);text-decoration:none;font-size:.8rem;font-weight:600"><i data-lucide="arrow-left" class="lucide-ico" aria-hidden="true"></i> All Categories</a>
          </div></div>`;
      if(window.lucide){lucide.createIcons();}
          return;
        }
        document.title = `${cat.label} — Nexo Hub`;
        const desc = `${sites.length} curated ${cat.label} sites on Nexo Hub.`;
        document.querySelector('meta[name="description"]').content = desc;
        document.querySelector('link[rel="canonical"]').href = `https://app.nexorealm.org/category/${esc(cat.id)}/`;
        document.querySelector('meta[property="og:title"]').content = `${cat.label} — Nexo Hub`;
        document.querySelector('meta[property="og:description"]').content = desc;

        main.innerHTML = `
          <a href="/category/" style="display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);text-decoration:none;margin-bottom:24px"><i data-lucide="arrow-left" class="lucide-ico" aria-hidden="true"></i> All Categories</a>
          <div class="cat-index-hero">
            <h1 class="cat-index-title">${catIconHTML(cat.icon)} ${esc(cat.label)}</h1>
            <p class="cat-index-sub">${sites.length} curated site${sites.length!==1?'s':''}</p>
          </div>
          <div class="cat-grid" id="siteGrid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">
            ${sites.length ? sites.map(siteCardHTML).join('') : '<p style="color:var(--muted);font-size:.85rem;grid-column:1/-1">No sites in this category yet.</p>'}
          </div>`;
      if(window.lucide){lucide.createIcons();}
        main.id = 'main-content';
        main.className = 'cat-index-wrap';
      }catch(e){
        main.innerHTML = `<div class="cat-index-wrap"><p style="text-align:center;padding:60px 20px;color:var(--muted)">Could not load this category right now. Please try again.</p></div>`;
      }
    }

    function load(){
      const slug = location.pathname.split('/').filter(p => p && p !== 'category')[0] || '';
      if(slug) loadCategoryDetail(decodeURIComponent(slug));
      else loadIndex();
    }
    load();
    document.addEventListener('DOMContentLoaded',function(){
      var btn=document.getElementById('themeToggle');
      if(btn)btn.addEventListener('click',function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('nexhub_theme',n);});
      var ham=document.getElementById('hamburger'),menu=document.getElementById('mobileMenu'),ov=document.getElementById('navOverlay');
      function oM(){ham.classList.add('is-open');menu.classList.add('is-open');ov.classList.add('is-open');ham.setAttribute('aria-expanded','true');menu.setAttribute('aria-hidden','false');document.body.style.overflow='hidden';}
      function cM(){ham.classList.remove('is-open');menu.classList.remove('is-open');ov.classList.remove('is-open');ham.setAttribute('aria-expanded','false');menu.setAttribute('aria-hidden','true');document.body.style.overflow='';}
      if(ham)ham.addEventListener('click',()=>ham.classList.contains('is-open')?cM():oM());
      if(ov)ov.addEventListener('click',cM);
      document.addEventListener('keydown',e=>{if(e.key==='Escape')cM();});
    });
  </script>
  <script src="/pwa-register.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
